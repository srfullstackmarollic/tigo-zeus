# mesh-canary — validação da captura ambient (Fase 3) no SAT dev.
# Teste descartável (NÃO faz parte do GitOps). Aplicar direto:
#   kubectl apply -f mesh-canary.yaml
# Remover depois:
#   kubectl delete -f mesh-canary.yaml   (ou: kubectl delete ns mesh-canary)
#
# echo-client bate de 1 em 1s no echo-server (busybox httpd). Ambos no ns
# rotulado istio.io/dataplane-mode=ambient -> ztunnel captura L4 + mTLS.
# Pods ficam READY 1/1 (sem sidecar) — prova do modo ambient.
apiVersion: v1
kind: Namespace
metadata:
  name: mesh-canary
  labels:
    istio.io/dataplane-mode: ambient
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-server
  namespace: mesh-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-server
  template:
    metadata:
      labels:
        app: echo-server
    spec:
      containers:
        - name: echo
          image: busybox:1.36
          command:
            - sh
            - -c
            - mkdir -p /www && echo hello > /www/index.html && httpd -f -v -p 8080 -h /www
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: echo-server
  namespace: mesh-canary
spec:
  selector:
    app: echo-server
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-client
  namespace: mesh-canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-client
  template:
    metadata:
      labels:
        app: echo-client
    spec:
      containers:
        - name: client
          image: busybox:1.36
          command:
            - sh
            - -c
            - while true; do wget -q -O- http://echo-server:8080/ >/dev/null 2>&1 || true; sleep 1; done
